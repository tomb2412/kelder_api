services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M
    #restart: "on-failure"

  kelder_api:
    build: .
    container_name: kelder_api
    privileged: true
    tty: true
    volumes:
      - /dev:/dev
      - logs:/app/logs
    devices:
      - /dev/gpiomem
      - /dev/mem
    cap_add:
      - SYS_RAWIO
    ports:
      - "8000:80"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    env_file:
      - .env 
    extra_hosts:
      - "host.docker.internal:host-gateway"
    #restart: "on-failure"

  worker:
    build: .
    privileged: true
    volumes:
      - logs:/app/logs
    environment:
      REDIS_HOST: redis
    devices:
      - "/dev/ttyAMA0:/dev/ttyAMA0"
      - "/dev/ttyS0:/dev/ttyS0"
    command: [ "uv", "run", "python", "-m", "src.kelder_api.app.background_orchestrator" ]
    depends_on:
      - redis
    env_file:
      - .env 
    #restart: "on-failure"

volumes:
  logs:
