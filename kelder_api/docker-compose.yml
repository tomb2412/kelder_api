version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M

  kelder_api:
    build: .
    container_name: kelder_api
    privileged: true
    tty: true
    volumes:
      - /dev:/dev
      - logs:/app/logs
    devices:
      - /dev/gpiomem
      - /dev/mem
      - /dev/gpiomem:/dev/gpiomem
      - /dev/i2c-1:/dev/i2c-1
    cap_add:
      - SYS_RAWIO
    ports:
      - "8000:80"
    depends_on:
      - redis
    environment:
      - REDIS_HOST:redis
      - BLINKA_FT232H:0
    env_file:
      - .env 

  worker:
    build: .
    privileged: true
    volumes:
      - logs:/app/logs
    environment:
      - REDIS_HOST=redis
      - BLINKA_FT232H=0
    devices:
      - "/dev/ttyyAMA0:/dev/ttyyAMA0"
      - "/dev/ttys0:/dev/ttys0"
      - /dev/gpiomem
      - /dev/mem
      - /dev/gpiomem:/dev/gpiomem
      - /dev/i2c-1:/dev/i2c-1
    command: [ "poetry", "run", "python", "-m", "src.kelder_api.app.background_orchestrator" ]
    depends_on:
      - redis
    env_file:
      - .env 

volumes:
  logs:
