name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      working-directory: kelder_api
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install dependencies
      working-directory: kelder_api
      run: |
        uv sync --all-extras --dev

    - name: Run lint
      working-directory: kelder_api
      run: uv run ruff check . --exclude tests/notebooks

    - name: Run format check
      working-directory: kelder_api
      run: uv run ruff format --check . --exclude tests/notebooks

    - name: Run tests
      working-directory: kelder_api
      run: uv run pytest
